<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pokemon Team Builder</title>

  <style>
  body {
    background-color: #cfe8f3; /* light blue */
    font-family: Arial, sans-serif;
    text-align: center;
  }

  h1 {
    margin-top: 20px;
  }

  #pokemonArea {
    background-color: white;
    border: 6px solid #d4a017; /* gold border */
    border-radius: 25px;
    width: 400px;
    margin: 30px auto;
    padding: 20px;
  }

  #pokemonArea h2 {
    margin-bottom: 10px;
  }

  img {
    margin: 10px 0;
  }

  select {
    width: 160px;
    margin: 5px;
    padding: 4px;
  }

  button {
    padding: 8px 14px;
    margin-top: 10px;
    cursor: pointer;
  }

  #btnAdd {
    margin-top: 15px;
  }

  #teamList {
    width: 400px;
    margin: 0 auto;
    text-align: left;
  }

  hr {
    margin: 30px 0;
  }
  </style>
</head>
  
<body>
  <h1>Pokemon Team Builder</h1>

  <label for="query">Name or ID</label>
  <input id="query" type="text" placeholder="e.g. 143 or snorlax" />
  <button id="btnFind">Find</button>

  <hr />

  <div id="pokemonArea">
    <h2 id="pokeName">---</h2>
    <img id="pokeImg" alt="Pokemon image" width="250" />
    <div>
      <audio id="pokeAudio" controls></audio>
      <p id="audioMsg"></p>
    </div>

    <div>
      <select id="move1"></select>
      <select id="move2"></select>
      <select id="move3"></select>
      <select id="move4"></select>
    </div>

    <button id="btnAdd">Add to Team</button>
  </div>

  <hr />

  <h2>My Team</h2>
  <ol id="teamList"></ol>

  <script src="script.js"></script>
</body>
</html>
