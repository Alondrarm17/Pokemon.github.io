<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pokemon Team Builder</title>

  <style>
    body {
      background-color: #b7dce8;
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 0;
      padding: 20px 0;
    }

    .card {
      background: #fff;
      border: 8px solid #c89b0e;
      border-radius: 26px;
      width: 420px;
      margin: 0 auto;
      padding: 18px 18px 22px;
    }

    .searchLabel {
      font-size: 20px;
      font-weight: 600;
      margin: 6px 0 6px;
    }

    .searchRow {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    #query {
      width: 230px;
      padding: 6px;
      font-size: 14px;
    }

    #btnFind {
      padding: 6px 12px;
      cursor: pointer;
    }

    #pokeName {
      margin: 6px 0 10px;
      font-size: 22px;
    }

    #pokeImg {
      width: 230px;
      height: 230px;
      object-fit: contain;
      display: block;
      margin: 0 auto 8px;
    }

    audio {
      width: 92%;
      margin: 6px auto 10px;
      display: block;
    }

    #audioMsg {
      margin: 0 0 10px;
      font-size: 12px;
      color: #444;
    }

    .movesGrid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px 10px;
      justify-items: center;
      margin: 10px 0 10px;
    }

    select {
      width: 170px;
      padding: 4px;
    }

    #btnAdd {
      padding: 7px 14px;
      cursor: pointer;
      margin: 8px 0 14px;
    }

    .teamTitle {
      margin: 14px 0 8px;
      font-size: 20px;
      font-weight: 700;
      text-align: left;
    }

    .teamBox {
      border: 1px solid #aaa;
      padding: 10px;
      border-radius: 6px;
      background: #fff;
      text-align: left;
    }

    .teamEntry {
      border: 1px solid #bbb;
      border-radius: 6px;
      padding: 8px;
      margin: 10px 0;
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }

    .teamEntry img {
      width: 70px;
      height: 70px;
      object-fit: contain;
      border: 1px solid #ddd;
      border-radius: 6px;
      background: #fff;
    }

    .teamEntry h4 {
      margin: 0 0 6px;
      font-size: 16px;
    }

    .teamEntry ul {
      margin: 0;
      padding-left: 18px;
    }

    .muted {
      color: #555;
      font-size: 12px;
    }
  </style>
</head>

<body>
  <div class="card">
    <!-- Search -->
    <div class="searchLabel">Name or ID</div>
    <div class="searchRow">
      <input id="query" type="text" placeholder="e.g. snorlax or 143" />
      <button id="btnFind">Find</button>
    </div>

    <!-- Pokemon Display -->
    <h2 id="pokeName">---</h2>
    <img id="pokeImg" alt="Pokemon image" />

    <audio id="pokeAudio" controls></audio>
    <p id="audioMsg" class="muted"></p>

    <div class="movesGrid">
      <select id="move1"></select>
      <select id="move2"></select>
      <select id="move3"></select>
      <select id="move4"></select>
    </div>

    <button id="btnAdd">Add to Team</button>

    <!-- Team (inside same box) -->
    <div class="teamTitle">My Team</div>
    <div class="teamBox" id="teamList"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
